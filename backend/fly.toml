# fly.toml — Postmortem backend
#
# One Fly machine in EWR (matches brain-relay region), 1GB RAM, with a
# persistent volume at /data holding the DuckDB ledger. Single-worker
# uvicorn because DuckDB's file lock doesn't like concurrent writers
# and we don't need to scale the hackathon deploy.

app = "postmortem-backend"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  # The LEDGER_DB_PATH is also set in Dockerfile; keeping it here makes
  # it visible when inspecting `fly config show`.
  LEDGER_DB_PATH = "/data/ledger.duckdb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

[mounts]
  source = "ledger_data"
  destination = "/data"
